<div class="flex flex-wrap justify-center gap-2">
  {{ range .Site.Params.social.list }}
    {{ $raw := .id | default (replaceRE `^.*fa-` `` (.icon | default "")) }}
    {{ $id := cond (eq $raw "linkedin-in") "linkedin" $raw }}
    <a
      class="social-chip"
      href="{{ .url }}"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="{{ .title }}"
      title="{{ .title }}"
    >
      {{ partial "icon" (dict "name" $id "class" "h-4 w-4") }}
      <span class="text-sm">{{ .title }}</span>
    </a>
  {{ end }}
</div>
