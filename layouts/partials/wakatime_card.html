{{- $light := .Site.Params.social.wakatime_card.light | default "" -}}
{{- $dark := .Site.Params.social.wakatime_card.dark | default "" -}}

{{- if and $light $dark -}}
<img
  data-wakatime
  data-light-src="{{ $light }}"
  data-dark-src="{{ $dark }}"
  src="{{ $light }}"
  alt="Coding activity heatmap"
  class="mt-8 w-full h-auto"
  loading="lazy"
  decoding="async"
  referrerpolicy="no-referrer"
/>
{{- end -}}
