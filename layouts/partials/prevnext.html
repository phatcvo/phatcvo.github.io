<div class="flex flex-col sm:flex-row gap-3 sm:items-stretch sm:justify-between">
  {{ if .PrevInSection }}
    <a class="card p-5 hover:no-underline flex-1" href="{{ .PrevInSection.RelPermalink }}">
      <p class="m-0 text-xs font-semibold uppercase tracking-widest text-stone-500 dark:text-stone-400">Previous</p>
      <p class="mt-2 mb-0 font-semibold text-stone-900 dark:text-stone-50">{{ .PrevInSection.Title }}</p>
    </a>
  {{ else }}
    <div class="card p-5 flex-1 opacity-50">
      <p class="m-0 text-xs font-semibold uppercase tracking-widest text-stone-500 dark:text-stone-400">Previous</p>
      <p class="mt-2 mb-0 font-semibold text-stone-900 dark:text-stone-50">—</p>
    </div>
  {{ end }}

  {{ if .NextInSection }}
    <a class="card p-5 hover:no-underline flex-1" href="{{ .NextInSection.RelPermalink }}">
      <p class="m-0 text-xs font-semibold uppercase tracking-widest text-stone-500 dark:text-stone-400">Next</p>
      <p class="mt-2 mb-0 font-semibold text-stone-900 dark:text-stone-50">{{ .NextInSection.Title }}</p>
    </a>
  {{ else }}
    <div class="card p-5 flex-1 opacity-50">
      <p class="m-0 text-xs font-semibold uppercase tracking-widest text-stone-500 dark:text-stone-400">Next</p>
      <p class="mt-2 mb-0 font-semibold text-stone-900 dark:text-stone-50">—</p>
    </div>
  {{ end }}
</div>
