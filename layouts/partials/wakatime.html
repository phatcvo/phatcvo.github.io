{{- $light := .Site.Params.wakatime.chart.light | default "" -}}
{{- $dark := .Site.Params.wakatime.chart.dark | default "" -}}

{{- if and $light $dark -}}
<div class="card p-6" data-reveal>
  <div class="mt-4 rounded-2xl border border-stone-200 dark:border-stone-800 overflow-hidden bg-stone-50 dark:bg-stone-950">
    <picture>
      <source media="(prefers-color-scheme: dark)" srcset="{{ $dark }}" />
      <source media="(prefers-color-scheme: light)" srcset="{{ $light }}" />
      <img
        data-wakatime
        data-light-src="{{ $light }}"
        data-dark-src="{{ $dark }}"
        src="{{ $light }}"
        alt="Coding activity chart (7-day snapshot)"
        class="w-full h-auto"
        loading="lazy"
        decoding="async"
        referrerpolicy="no-referrer"
      />
    </picture>
  </div>
</div>
{{- end -}}
